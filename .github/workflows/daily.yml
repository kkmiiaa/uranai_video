name: Daily Fortune Video

on:
  schedule:
    # 07:00 JST (22:00 UTC previous day)
    - cron: '0 22 * * *'
    # 14:00 JST (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Single date (YYYY-MM-DD)'
        required: false
      start_date:
        description: 'Batch start date (YYYY-MM-DD)'
        required: false
      end_date:
        description: 'Batch end date (YYYY-MM-DD)'
        required: false

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies

        run: npm ci

      - name: Resolve date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            START="${{ github.event.inputs.start_date }}"
            END="${{ github.event.inputs.end_date }}"
            START_SEC=$(date -d "$START" +%s)
            END_SEC=$(date -d "$END" +%s)
            if [ "$END_SEC" -lt "$START_SEC" ]; then
              echo "end_date must be >= start_date" >&2
              exit 1
            fi
            DAYS=$(( (END_SEC - START_SEC) / 86400 + 1 ))
            echo "start_date=$START" >> $GITHUB_OUTPUT
            echo "days=$DAYS" >> $GITHUB_OUTPUT
            echo "date=$START" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date +%F)" >> $GITHUB_OUTPUT
          fi

      - name: Generate and render

        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p out
          if [ -n "${{ steps.date.outputs.start_date }}" ]; then
            node scripts/orchestrate.js \
              --start ${{ steps.date.outputs.start_date }} \
              --days ${{ steps.date.outputs.days }} \
              --out-dir out \
              --prompt prompts/gemini_fortune.txt \
              --upload-gcs true \
              --cleanup true
          else
            node scripts/orchestrate.js \
              --date ${{ steps.date.outputs.date }} \
              --out-dir out \
              --prompt prompts/gemini_fortune.txt \
              --upload-gcs true
          fi

      - name: Read GCS URL
        id: gcs

        run: |
          DATE="${{ steps.date.outputs.date }}"
          GCS_FILE="out/gcs-fortune-${DATE}.json"
          if [ ! -f "$GCS_FILE" ]; then
            echo "GCS file not found: $GCS_FILE" >&2
            exit 1
          fi
          URL=$(node -e "process.stdout.write(require('./${GCS_FILE}').url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Post to Instagram

        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_API_VERSION: ${{ secrets.IG_API_VERSION }}
        run: |
          DATE="${{ steps.date.outputs.date }}"
          FORMATTED=$(date -d "$DATE" "+%Y年%-m月%-d日")
          cat > /tmp/caption.txt << 'CAPTION_EOF'
          CAPTION_EOF
          printf '%s\n' \
            "${FORMATTED}の12星座ランキング🌙" \
            "今日いちばん運がいい星座は...？" \
            "" \
            "占aiでは、複数の占術データをAIで統合して、毎日の運勢をまとめています。" \
            "" \
            "フォローすると、毎日の占いをタイムラインで受け取れます🤍" \
            "当たってたら、シェアして友達にも送ってみて🌙" \
            "" \
            "#占い #今日の運勢 #星座 #12星座 #星座占い #今日の星座 #星座ランキング #運勢 #開運 #スピリチュアル #今日のラッキー #朝の占い #毎日占い #占いアプリ #星占い #ホロスコープ #astrology #zodiac #fortunetelling #スピリチュアル女子 #引き寄せ #引き寄せの法則 #潜在意識 #自己啓発 #朝活 #朝のルーティン" \
            > /tmp/caption.txt
          CAPTION=$(cat /tmp/caption.txt)
          node scripts/ig-publish.js \
            --video-url "${{ steps.gcs.outputs.url }}" \
            --caption "$CAPTION" \
            --thumb-offset 5000

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fortune-${{ steps.date.outputs.date }}
          path: |
            out/props/
            out/gcs-*.json
          if-no-files-found: warn

  build-and-post-tarot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 5 * * *'
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date +%F)" >> $GITHUB_OUTPUT
          fi

      - name: Generate and render (tarot)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p out
          node scripts/orchestrate.js \
            --date ${{ steps.date.outputs.date }} \
            --mode tarot \
            --prefix tarot \
            --out-dir out \
            --prompt prompts/gemini_tarot.txt \
            --upload-gcs true

      - name: Read GCS URL (tarot)
        id: gcs
        run: |
          DATE="${{ steps.date.outputs.date }}"
          GCS_FILE="out/gcs-tarot-${DATE}.json"
          if [ ! -f "$GCS_FILE" ]; then
            echo "GCS file not found: $GCS_FILE" >&2
            exit 1
          fi
          URL=$(node -e "process.stdout.write(require('./${GCS_FILE}').url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Post to Instagram (tarot)
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_API_VERSION: ${{ secrets.IG_API_VERSION }}
        run: |
          DATE="${{ steps.date.outputs.date }}"
          FORMATTED=$(date -d "$DATE" "+%Y年%-m月%-d日")
          printf '%s\n' \
            "${FORMATTED}の今日のタロット🌙" \
            "あなたが選んだカードはどれ？" \
            "" \
            "占aiでは、毎日のタロット占いをAIが解説しています。" \
            "" \
            "フォローすると、毎日の占いをタイムラインで受け取れます🤍" \
            "当たってたら、シェアして友達にも送ってみて🌙" \
            "" \
            "#タロット #タロット占い #今日のタロット #タロットカード #占い #スピリチュアル #今日の運勢 #引き寄せ #引き寄せの法則 #潜在意識 #直感 #自己啓発 #朝活 #開運 #毎日占い #tarot #tarotreading #tarotcard #oracle #spirituality" \
            > /tmp/tarot_caption.txt
          CAPTION=$(cat /tmp/tarot_caption.txt)
          node scripts/ig-publish.js \
            --video-url "${{ steps.gcs.outputs.url }}" \
            --caption "$CAPTION" \
            --thumb-offset 10000

      - name: Upload artifacts (tarot)
        uses: actions/upload-artifact@v4
        with:
          name: tarot-${{ steps.date.outputs.date }}
          path: |
            out/props/
            out/gcs-tarot-*.json
          if-no-files-found: warn
