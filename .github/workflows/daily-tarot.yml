name: Daily Tarot

on:
  schedule:
    # ~20:00 JST (07:30 UTC, offset from :00 to reduce GH Actions queue delay)
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Single date (YYYY-MM-DD)'
        required: false

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date -d '+1 day' +%F)" >> $GITHUB_OUTPUT
          fi

      - name: Generate and render
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p out
          node scripts/orchestrate.js \
            --date ${{ steps.date.outputs.date }} \
            --mode tarot \
            --prefix tarot \
            --out-dir out \
            --prompt prompts/gemini_tarot.txt \
            --upload-gcs true

      - name: Read GCS URL
        id: gcs
        run: |
          DATE="${{ steps.date.outputs.date }}"
          GCS_FILE="out/gcs-tarot-${DATE}.json"
          if [ ! -f "$GCS_FILE" ]; then
            echo "GCS file not found: $GCS_FILE" >&2
            exit 1
          fi
          URL=$(node -e "process.stdout.write(require('./${GCS_FILE}').url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Post to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_API_VERSION: ${{ secrets.IG_API_VERSION }}
        run: |
          DATE="${{ steps.date.outputs.date }}"
          FORMATTED=$(date -d "$DATE" "+%Y年%-m月%-d日")
          printf '%s\n' \
            "${FORMATTED}の明日のタロット🌙" \
            "あなたが選んだカードはどれ？" \
            "" \
            "占aiでは、毎日のタロット占いをAIが解説しています。" \
            "" \
            "フォローすると、毎日の占いをタイムラインで受け取れます🤍" \
            "当たってたら、シェアして友達にも送ってみて🌙" \
            "" \
            "#タロット #タロット占い #今日のタロット #タロットカード #占い #スピリチュアル #今日の運勢 #引き寄せ #引き寄せの法則 #潜在意識 #直感 #自己啓発 #朝活 #開運 #毎日占い #tarot #tarotreading #tarotcard #oracle #spirituality" \
            > /tmp/tarot_caption.txt
          CAPTION=$(cat /tmp/tarot_caption.txt)
          node scripts/ig-publish.js \
            --video-url "${{ steps.gcs.outputs.url }}" \
            --caption "$CAPTION" \
            --thumb-offset 3000

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tarot-${{ steps.date.outputs.date }}
          path: |
            out/props/
            out/gcs-tarot-*.json
          if-no-files-found: warn
